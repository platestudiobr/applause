<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applause</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f5e8;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .nav-logo svg {
            height: 32px;
            width: auto;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #444;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-links a:hover { color: #1a2340; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #444;
            display: flex;
            align-items: center;
        }
        .nav-cta {
            padding: 8px 20px;
            border: 1.5px solid #1a2340;
            border-radius: 6px;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: #1a2340;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-cta:hover { background: #1a2340; color: #fff; }

        /* PAGE */
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px 48px;
            gap: 20px;
        }

        /* BADGE */
        .badge {
            background: rgba(180,220,215,0.25);
            border: 1px solid #9eccc7;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 13px;
            color: #3a6b68;
        }
        .badge strong { font-weight: 700; }

        /* HEADING */
        h1 {
            font-size: clamp(26px, 3.5vw, 40px);
            font-weight: 800;
            color: #1a2340;
            text-align: center;
            line-height: 1.2;
            max-width: 560px;
        }

        /* ANIMATION — 2x: 360x408 */
        #animation-container {
            width: 360px;
            height: 408px;
        }

        /* CHAT MESSAGES */
        #chat-messages {
            width: 100%;
            max-width: 540px;
            min-height: 230px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e4d6;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .msg { display: flex; animation: fadeUp 0.25s ease-out; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.bot { justify-content: flex-start; }
        .msg.user { justify-content: flex-end; }

        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.45;
            word-break: break-word;
        }
        .msg.bot .bubble { background: #f0ede0; color: #1a2340; }
        .msg.user .bubble { background: #3dbfbf; color: #fff; }

        /* INPUT ROW */
        .input-row {
            width: 100%;
            max-width: 540px;
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 11px 14px;
            border: 1.5px solid #d8d4c8;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: #3dbfbf; }
        .send-btn {
            padding: 11px 24px;
            background: #3dbfbf;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #2eadad; }
        .send-btn:active { background: #259b9b; }
        .reset-btn {
            padding: 11px 18px;
            background: transparent;
            color: #888;
            border: 1.5px solid #d8d4c8;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .reset-btn:hover { border-color: #aaa; color: #444; }
    </style>
</head>

class AnimationManager {
    constructor(container) {
        this.container = container;
        this.current = null;
        this.pendingWalk = false;
    }

    startIdle() {
        if (this.current) { this.current.destroy(); this.current = null; }
        this.current = lottie.loadAnimation({
            container: this.container,
            renderer: 'svg',
            loop: true,
            autoplay: true,
            animationData: IDLE_DATA
        });
        if (this.pendingWalk) {
            this.current.addEventListener('loopComplete', () => this._triggerWalk(), { once: true });
        }
    }

    triggerWalk() {
        if (this.pendingWalk) return;
        this.pendingWalk = true;
        // Aguarda o loop atual do idle terminar naturalmente — transição fluida
        this.current.addEventListener('loopComplete', () => this._triggerWalk(), { once: true });
    }

    _triggerWalk() {
        this.pendingWalk = false;
        if (this.current) { this.current.destroy(); this.current = null; }
        this.current = lottie.loadAnimation({
            container: this.container,
            renderer: 'svg',
            loop: false,
            autoplay: true,
            animationData: WALK_DATA
        });
    }
}

const animMgr = new AnimationManager(document.getElementById('animation-container'));
animMgr.startIdle();

function addMessage(text, sender) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

function handleSend() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    if (text.toUpperCase() === 'SIM') {
        setTimeout(() => addMessage('Missão confirmada! 🎉', 'bot'), 300);
        animMgr.triggerWalk();
    }
}

function handleReset() {
    // Reinicia animação
    if (animMgr.current) { animMgr.current.destroy(); animMgr.current = null; }
    animMgr.pendingWalk = false;
    animMgr.startIdle();
    // Limpa chat
    document.getElementById('chat-messages').innerHTML = '';
    addMessage('Você completou a missão? Digite SIM para confirmar.', 'bot');
}

document.getElementById('send-btn').addEventListener('click', handleSend);
document.getElementById('reset-btn').addEventListener('click', handleReset);
document.getElementById('chat-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleSend();
});

addMessage('Você completou a missão? Digite SIM para confirmar.', 'bot');
</script>
</body>
</html>
